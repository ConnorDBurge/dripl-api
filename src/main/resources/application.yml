spring:
  application:
    name: balanced-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:balanced}
    username: ${DB_USERNAME:balanced}
    password: ${DB_PASSWORD:balanced}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  graphql:
    graphiql:
      enabled: false
    schema:
      locations: classpath:graphql/**/

server:
  port: 8080

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} %5p [id:%X{correlationId:-}] [u:%X{userId:-}] [ws:%X{workspaceId:-}] --- [%t] %-40.40logger{39} : %m%n"

management:
  endpoints:
    web:
      exposure:
        include: health

balanced:
  api-key: ${API_KEY:balanced-dev-api-key}
  encryption:
    key: ${BALANCED_ENCRYPTION_KEY}
  jwt:
    secret: ${JWT_SECRET:balanced-dev-secret-key-change-in-production-must-be-at-least-256-bits}
    expiration-ms: 900000 # 15 minutes
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  aggregation:
    provider: ${BANK_PROVIDER}
    teller:
      application-id: ${TELLER_APP_ID:}
      environment: ${TELLER_ENV:sandbox}
      certificate-path: ${TELLER_CERT_PATH:}
      private-key-path: ${TELLER_KEY_PATH:}
