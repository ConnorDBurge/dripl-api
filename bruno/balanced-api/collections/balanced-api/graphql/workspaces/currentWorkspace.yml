info:
  name: currentWorkspace
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      query CurrentWorkspace {
        currentWorkspace {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          name
          status
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
