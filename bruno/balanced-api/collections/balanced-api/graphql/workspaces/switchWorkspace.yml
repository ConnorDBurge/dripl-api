info:
  name: switchWorkspace
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation SwitchWorkspace($input: SwitchWorkspaceInput!) {
        switchWorkspace(input: $input) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          name
          status
          token
        }
      }
    variables: |-
      {
        "input": {
          "workspaceId": "00000000-0000-0000-0000-000000000000"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
