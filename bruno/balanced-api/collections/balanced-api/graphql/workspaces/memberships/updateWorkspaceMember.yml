info:
  name: updateWorkspaceMember
  type: graphql
  seq: 6

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation UpdateWorkspaceMember($userId: ID!, $input: UpdateMembershipInput!) {
        updateWorkspaceMember(userId: $userId, input: $input) {
          userId
          workspaceId
          givenName
          familyName
          email
          roles
          status
          joinedAt
        }
      }
    variables: |-
      {
        "userId": "00000000-0000-0000-0000-000000000000",
        "input": {
          "roles": ["READ", "WRITE"]
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
