info:
  name: workspaceMembers
  type: graphql
  seq: 6

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      query WorkspaceMembers {
        workspaceMembers {
          userId
          workspaceId
          givenName
          familyName
          email
          roles
          status
          joinedAt
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
