info:
  name: provisionWorkspace
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation ProvisionWorkspace($input: CreateWorkspaceInput!) {
        provisionWorkspace(input: $input) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          name
          status
          token
        }
      }
    variables: |-
      {
        "input": {
          "name": "My New Workspace"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
