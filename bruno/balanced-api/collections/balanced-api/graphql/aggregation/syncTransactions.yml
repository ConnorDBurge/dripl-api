info:
  name: syncTransactions
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation SyncTransactions($bankConnectionId: ID!) {
        syncTransactions(bankConnectionId: $bankConnectionId) {
          transactionsAdded
          transactionsModified
          transactionsRemoved
          accountsSynced
        }
      }
    variables: |-
      {
        "bankConnectionId": "043a80c4-9a95-42f6-ada9-5e1c304d0558"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
