info:
  name: linkBank
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation LinkBank($input: LinkBankInput!) {
        linkBank(input: $input) {
          id
          createdAt
          updatedAt
          workspaceId
          provider
          enrollmentId
          institutionId
          institutionName
          status
          lastSyncedAt
        }
      }
    variables: |-
      {
        "input": {
          "accessToken": "test_token_ulzsecyyq42f6"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
