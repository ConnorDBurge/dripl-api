info:
  name: budgets
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      query Budgets {
        budgets {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          name
          anchorDay1
          anchorDay2
          intervalDays
          anchorDate
          accountIds
          currentPeriodStart
          currentPeriodEnd
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
