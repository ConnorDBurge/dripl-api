info:
  name: createTransaction
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |
      mutation CreateTransaction($input: CreateTransactionInput!) {
        createTransaction(input: $input) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          accountId
          merchantId
          categoryId
          date
          amount
          currencyCode
          notes
          status
          source
          pendingAt
          postedAt
          recurringItemId
          occurrenceDate
          groupId
          splitId
          tagIds
        }
      }
    variables: |-
      {
        "input": {
          "accountId": "50179f7b-92f3-480e-a767-3783307c80f8",
          "merchantName": "Whole Foods",
          "date": "2026-03-06T00:00:00",
          "amount": "-100.00",
          "currencyCode": "USD",
          "notes": "Weekly groceries",
          "tagIds": []
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
