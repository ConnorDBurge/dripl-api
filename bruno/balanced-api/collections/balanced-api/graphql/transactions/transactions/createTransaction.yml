info:
  name: createTransaction
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |
      mutation CreateTransaction($input: CreateTransactionInput!) {
        createTransaction(input: $input) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          accountId
          merchantId
          categoryId
          date
          amount
          currencyCode
          notes
          status
          source
          pendingAt
          postedAt
          recurringItemId
          occurrenceDate
          groupId
          splitId
          tagIds
        }
      }
    variables: |-
      {
        "input": {
          "accountId": "a4b64e2d-fab1-4e72-a39e-0714ba13499d",
          "merchantName": "Whole Foods",
          "date": "2026-03-06T00:00:00",
          "amount": "-75.50",
          "currencyCode": "USD",
          "notes": "Weekly groceries",
          "tagIds": []
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
