info:
  name: updateTransaction
  type: graphql
  seq: 5

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation UpdateTransaction($transactionId: ID!, $input: UpdateTransactionInput!) {
        updateTransaction(transactionId: $transactionId, input: $input) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          accountId
          merchantId
          categoryId
          date
          amount
          currencyCode
          notes
          status
          source
          pendingAt
          postedAt
          recurringItemId
          occurrenceDate
          groupId
          splitId
          tagIds
        }
      }
    variables: |-
      {
        "transactionId": "063eb8bc-9b0f-4526-9418-a462b126fde3",
        "input": {
          "categoryId": "c859274f-ece1-4098-8b4d-cdea5c1fea6a"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
