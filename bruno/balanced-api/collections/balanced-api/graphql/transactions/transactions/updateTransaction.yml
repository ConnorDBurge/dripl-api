info:
  name: updateTransaction
  type: graphql
  seq: 5

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation UpdateTransaction($transactionId: ID!, $input: UpdateTransactionInput!) {
        updateTransaction(transactionId: $transactionId, input: $input) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          accountId
          merchantId
          categoryId
          date
          amount
          currencyCode
          notes
          status
          source
          pendingAt
          postedAt
          recurringItemId
          occurrenceDate
          groupId
          splitId
          tagIds
        }
      }
    variables: |-
      {
        "transactionId": "a3db28af-a934-4089-b9c4-62ef325b90d1",
        "input": {
          "categoryId": "a5c1d20c-862b-4439-9e1b-25fe38515dba"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
