info:
  name: transactions
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      query Transactions {
        transactions {
          content {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          accountId
          merchantId
          categoryId
          date
          amount
          currencyCode
          notes
          status
          source
          pendingAt
          postedAt
          recurringItemId
          occurrenceDate
          groupId
          splitId
          tagIds
          }
          page {
            number
            size
            totalElements
            totalPages
          }
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
