info:
  name: transactionSplit
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      query TransactionSplit($transactionSplitId: ID!) {
        transactionSplit(transactionSplitId: $transactionSplitId) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          accountId
          totalAmount
          currencyCode
          date
          transactionIds
        }
      }
    variables: |-
      {
        "transactionSplitId": "00000000-0000-0000-0000-000000000000"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
