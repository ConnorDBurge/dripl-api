info:
  name: updateTransactionGroup
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation UpdateTransactionGroup($transactionGroupId: ID!, $input: UpdateTransactionGroupInput!) {
        updateTransactionGroup(transactionGroupId: $transactionGroupId, input: $input) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          name
          categoryId
          notes
          tagIds
          totalAmount
          transactionIds
        }
      }
    variables: |-
      {
        "transactionGroupId": "00000000-0000-0000-0000-000000000000",
        "input": {
          "name": "Updated Group Name",
          "notes": "Updated group notes"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
