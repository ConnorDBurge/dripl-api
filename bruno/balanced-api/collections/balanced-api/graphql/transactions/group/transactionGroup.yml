info:
  name: transactionGroup
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      query TransactionGroup($transactionGroupId: ID!) {
        transactionGroup(transactionGroupId: $transactionGroupId) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          name
          categoryId
          notes
          tagIds
          totalAmount
          transactionIds
        }
      }
    variables: |-
      {
        "transactionGroupId": "00000000-0000-0000-0000-000000000000"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
