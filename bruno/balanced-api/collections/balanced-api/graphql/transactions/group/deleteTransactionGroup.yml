info:
  name: deleteTransactionGroup
  type: graphql
  seq: 5

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation DeleteTransactionGroup($transactionGroupId: ID!) {
        deleteTransactionGroup(transactionGroupId: $transactionGroupId)
      }
    variables: |-
      {
        "transactionGroupId": "00000000-0000-0000-0000-000000000000"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
