info:
  name: deleteAccount
  type: graphql
  seq: 5

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation DeleteAccount($accountId: ID!) {
        deleteAccount(accountId: $accountId)
      }
    variables: |-
      {
        "accountId": "00000000-0000-0000-0000-000000000000"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
