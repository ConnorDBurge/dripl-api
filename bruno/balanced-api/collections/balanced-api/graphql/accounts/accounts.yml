info:
  name: accounts
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      query Accounts {
        accounts {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          name
          type
          subType
          startingBalance
          balance
          currency
          institutionName
          source
          status
          balanceLastUpdated
          closedAt
          externalId
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
