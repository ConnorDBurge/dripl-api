info:
  name: account
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      query Account($accountId: ID!) {
        account(accountId: $accountId) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          name
          type
          subType
          startingBalance
          balance
          currency
          institutionName
          source
          status
          balanceLastUpdated
          closedAt
          externalId
        }
      }
    variables: |-
      {
        "accountId": "a4b64e2d-fab1-4e72-a39e-0714ba13499d"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
