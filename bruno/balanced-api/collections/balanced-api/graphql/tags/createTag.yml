info:
  name: createTag
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation CreateTag($input: CreateTagInput!) {
        createTag(input: $input) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          name
          description
          status
        }
      }
    variables: |-
      {
        "input": {
          "name": "Travel",
          "description": "Travel-related expenses"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
