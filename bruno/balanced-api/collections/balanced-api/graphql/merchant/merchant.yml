info:
  name: merchant
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      query Merchant($merchantId: ID!) {
        merchant(merchantId: $merchantId) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          name
          status
        }
      }
    variables: |-
      {
        "merchantId": "98dd68a4-5506-4ea0-bf72-9c2741846dde"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
