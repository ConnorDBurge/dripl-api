info:
  name: createBudget
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation CreateBudget($input: CreateBudgetInput!) {
        createBudget(input: $input) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          name
          anchorDay1
          anchorDay2
          intervalDays
          anchorDate
          accountIds
          currentPeriodStart
          currentPeriodEnd
        }
      }
    variables: |-
      {
        "input": {
          "name": "Bi-Weekly Budget",
          "anchorDate": "2026-03-06",
          "intervalDays": 14,
          "accountIds": [
            "0ea1bb65-9860-434b-abde-7752ab0d2baf"
          ]
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
