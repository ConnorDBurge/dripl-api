info:
  name: category
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      query Category($categoryId: ID!) {
        category(categoryId: $categoryId) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          parentId
          name
          description
          status
          income
          excludeFromBudget
          excludeFromTotals
          displayOrder
        }
      }
    variables: |-
      {
        "categoryId": "00000000-0000-0000-0000-000000000000"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
