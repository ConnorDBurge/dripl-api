info:
  name: createCategory
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation CreateCategory($input: CreateCategoryInput!) {
        createCategory(input: $input) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          parentId
          name
          description
          status
          income
          excludeFromBudget
          excludeFromTotals
          displayOrder
        }
      }
    variables: |-
      {
        "input": {
          "name": "Groceries",
          "description": "Food and household supplies",
          "income": false,
          "excludeFromBudget": false,
          "excludeFromTotals": false
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
