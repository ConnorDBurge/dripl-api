info:
  name: deleteCategory
  type: graphql
  seq: 6

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation DeleteCategory($categoryId: ID!) {
        deleteCategory(categoryId: $categoryId)
      }
    variables: |-
      {
        "categoryId": "00000000-0000-0000-0000-000000000000"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
