info:
  name: moveCategory
  type: graphql
  seq: 7

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation MoveCategory($categoryId: ID!, $displayOrder: Int!) {
        moveCategory(categoryId: $categoryId, displayOrder: $displayOrder)
      }
    variables: |-
      {
        "categoryId": "00000000-0000-0000-0000-000000000000",
        "displayOrder": 3
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
