info:
  name: categoryTree
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      query CategoryTree {
        categoryTree {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          parentId
          name
          description
          status
          income
          excludeFromBudget
          excludeFromTotals
          displayOrder
          group
          children {
            id
            createdAt
            createdBy
            updatedAt
            updatedBy
            workspaceId
            parentId
            name
            description
            status
            income
            excludeFromBudget
            excludeFromTotals
            displayOrder
            group
            children {
              id
              name
              description
              parentId
              displayOrder
            }
          }
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
