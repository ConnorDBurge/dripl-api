info:
  name: merchants
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      query Merchants {
        merchants {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          name
          status
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
