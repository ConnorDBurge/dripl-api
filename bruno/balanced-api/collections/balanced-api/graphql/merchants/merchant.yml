info:
  name: merchant
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      query Merchant($merchantId: ID!) {
        merchant(merchantId: $merchantId) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          name
          status
        }
      }
    variables: |-
      {
        "merchantId": "00000000-0000-0000-0000-000000000000"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
