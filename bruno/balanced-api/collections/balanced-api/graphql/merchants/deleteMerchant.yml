info:
  name: deleteMerchant
  type: graphql
  seq: 5

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation DeleteMerchant($merchantId: ID!) {
        deleteMerchant(merchantId: $merchantId)
      }
    variables: |-
      {
        "merchantId": "00000000-0000-0000-0000-000000000000"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
