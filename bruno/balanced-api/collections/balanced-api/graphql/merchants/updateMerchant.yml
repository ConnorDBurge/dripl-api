info:
  name: updateMerchant
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{balanced-base-url}}/graphql"
  body:
    query: |-
      mutation UpdateMerchant($merchantId: ID!, $input: UpdateMerchantInput!) {
        updateMerchant(merchantId: $merchantId, input: $input) {
          id
          createdAt
          createdBy
          updatedAt
          updatedBy
          workspaceId
          name
          status
        }
      }
    variables: |-
      {
        "merchantId": "00000000-0000-0000-0000-000000000000",
        "input": {
          "name": "Updated Merchant Name"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
